services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fnb_forecasting
    ports:
      - "5433:5432"
    volumes:
      - fnb_pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
      - ./backend/sample_data:/data:ro

volumes:
  fnb_pgdata:
